name: PHP Lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        tools: none

    - name: Lint PHP files
      run: |
        set -euo pipefail
        failed=0
        while IFS= read -r -d '' file; do
          if ! php -l "$file" >/dev/null; then
            php -l "$file"
            failed=1
          fi
        done < <(find . -name '*.php' -not -path './vendor/*' -print0)
        exit "$failed"